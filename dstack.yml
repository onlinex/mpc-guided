type: task
name: mpc-control-smoke

image: maniskill/base

files:
  - .:/workflow

working_dir: /workflow

env:
  - PYTHONUNBUFFERED=1
  - MS_SKIP_ASSET_DOWNLOAD_PROMPT=1
  # Set this only when a future training entrypoint logs to W&B:
  #   uv run dstack secret set wandb_api_key '<your-key>'
  - WANDB_API_KEY

resources:
  gpu: A5000

max_duration: 2h

commands:
  - pip install -q uv
  - uv sync --frozen
  - >
    uv run python train_dynamics.py
    --render-backend gpu
    --sim-backend physx_cuda
    --initial-episodes 2
    --collection-rounds 1
    --episodes-per-round 1
    --max-steps 25
    --train-steps-per-round 25
